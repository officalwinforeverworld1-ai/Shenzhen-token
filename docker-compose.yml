services:
  postgres:
    image: postgres:16-alpine
    container_name: shen-zhen-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shen_zhen
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: shen_zhen_airdrop
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shen_zhen -d shen_zhen_airdrop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
